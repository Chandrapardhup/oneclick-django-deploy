services:
  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: headache
    ports:
      - "5433:5432"

  web:
    build: .
    container_name: django_app
    restart: always
    command: /entrypoint.sh
    ports:
      - "8006:8006"
    env_file:
      - .env
    depends_on:
      - db