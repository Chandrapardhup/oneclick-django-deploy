services:
  web:
    build: .
    command: >
      sh -c "
      until nc -z db 5432;
      do
        echo 'Waiting for DB...';
        sleep 2;
      done;
      python manage.py migrate &&
      python manage.py runserver 0.0.0.0:8000 --noreload
      "
    volumes:
      - .:/app
    ports:
      - "8007:8000"
    env_file:
      - .env
    depends_on:
      - db

  db:
    image: postgres:15
    environment:
      POSTGRES_DB: django_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: headache
    ports:
      - "5432:5432"