version: "3.9"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: headache
    ports:
      - "5433:5432"
    restart: always

  web:
    build: .
    command: /entrypoint.sh
    ports:
      - "8006:8006"
    env_file:
      - .env
    depends_on:
      - db
    restart: always